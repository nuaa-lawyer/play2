# ============================================================
# 法简AI - Netlify 部署配置
# 使用 Netlify Functions 代理 DeepSeek API 请求
# ============================================================

[build]
  publish = "/"
  command = "node -e \"const fs=require('fs');fs.writeFileSync('env.js','window.ENV='+JSON.stringify({DEEPSEEK_API_KEY:process.env.DEEPSEEK_API_KEY||'',DEEPSEEK_API_URL:'/.netlify/functions/deepseek-proxy',DEEPSEEK_MODEL:'deepseek-v4-pro',REQUEST_TIMEOUT:60000,MAX_DATA_DISPLAY:20})+';')\""

[functions]
  timeout = 60
  node_bundler = "esbuild"
  included_files = []

# SPA 路由回退（确保刷新页面正常）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 安全头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
