# ============================================================
# 法简AI - Netlify 部署配置
# 配置 API 代理规则，解决浏览器 CORS 跨域问题
# ============================================================

[build]
  command = "echo \"window.ENV = { DEEPSEEK_API_KEY: '${DEEPSEEK_API_KEY}', DEEPSEEK_API_URL: '/api/deepseek/v1/chat/completions', DEEPSEEK_MODEL: 'deepseek-v4-pro', REQUEST_TIMEOUT: 30000, MAX_DATA_DISPLAY: 20 };\" > env.js"
  publish = "/"

# DeepSeek API 代理
[[redirects]]
  from = "/api/deepseek/*"
  to = "https://api.deepseek.com/:splat"
  status = 200
  force = true
  headers = { X-Forwarded-Host = "api.deepseek.com" }

# SPA 路由回退（确保刷新页面正常）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 安全头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
