# ============================================================
# 法简AI - Netlify 部署配置
# 使用 Netlify Functions 代理 DeepSeek API 请求
# ============================================================

[build]
  publish = "/"

[functions]
  timeout = 30
  node_bundler = "none"
  external_node_modules = []
  included_files = []

# SPA 路由回退（确保刷新页面正常）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 安全头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
