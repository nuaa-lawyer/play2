# ============================================================
# 法简AI - Netlify 部署配置
# 使用 Netlify Functions 代理 DeepSeek API 请求
# ============================================================

[build]
  publish = "."
  command = "node -e \"var fs=require('fs'),k=process.env.DEEPSEEK_API_KEY||'';fs.writeFileSync('env.js','window.ENV={DEEPSEEK_API_KEY:'+JSON.stringify(k)+',DEEPSEEK_API_URL:'+JSON.stringify('/.netlify/functions/deepseek-proxy')+',DEEPSEEK_MODEL:'+JSON.stringify('deepseek-v4-pro')+',REQUEST_TIMEOUT:30000,MAX_DATA_DISPLAY:20};');\""

[functions]
  timeout = 60
  node_bundler = "esbuild"

# SPA 路由回退（确保刷新页面正常）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 安全头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
